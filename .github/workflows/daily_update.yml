name: Daily Weather Update
on:
  schedule:
    - cron: '0 20 * * *' # Runs every morning at 8am NZ time
  workflow_dispatch:      # Lets you run it manually to test

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Tools
        run: pip install -r requirements.txt
      - name: Run Weather App
        run: python weather_script.py
      - name: Save the Image
        run: |
          git config --global user.name "WeatherBot"
          git config --global user.email "bot@github.com"
          git add nelson_forecast.png
          git commit -m "Update weather graph" || exit 0
          git push
