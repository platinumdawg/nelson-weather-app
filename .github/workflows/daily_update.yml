name: Hourly Weather Update

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour on the hour
  workflow_dispatch: # Allows you to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pandas matplotlib

      - name: Run weather script
        run: python weather_app1.py

      - name: Commit and push changes
        run: |
          git config --global user.name "WeatherBot"
          git config --global user.email "bot@github.com"
          git add weather_update.png
          git commit -m "Hourly weather update" || exit 0
          git push
                - name: Commit and push changes
        run: |
          git config --global user.name "WeatherBot"
          git config --global user.email "bot@github.com"
          # This adds the file even if it's "new" or was deleted
          git add -A 
          # This prevents the error if there are no changes to the image
          git commit -m "Hourly weather update" || echo "No changes to commit"
          git push

